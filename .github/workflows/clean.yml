name: Clean

on:
  workflow_dispatch:
    inputs:
      delete_releases_days:
        description: 'Release retention days'
        required: false
        type: string
        default: '30'

  schedule:
    - cron: "0 4 * * 0"

jobs:
  delete:
    name: Delete
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Delete releases
        uses: apoiston/actions@cleaner
        with:
          enable_delete_releases: true
          delete_releases_days: ${{ inputs.delete_releases_days || '30' }}
